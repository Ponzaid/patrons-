# Va en tu repo en: .github/workflows/update-patrons.yml
# Regenera public/patrons.json desde Patreon y lo publica en GitHub Pages.

name: Update patrons

on:
  schedule:
    - cron: "0 * * * *"     # cada hora (UTC). Cambia a "0 */6 * * *" para cada 6 h, etc.
  workflow_dispatch:          # botón para correrlo a mano desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Evita que dos ejecuciones se pisen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch patrons
        env:
          PATREON_CLIENT_ID: ${{ secrets.PATREON_CLIENT_ID }}
          PATREON_CLIENT_SECRET: ${{ secrets.PATREON_CLIENT_SECRET }}
          PATREON_REFRESH_TOKEN: ${{ secrets.PATREON_REFRESH_TOKEN }}
        run: python fetch_patrons.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
